<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <style>
        .login-bg { background: linear-gradient(135deg, #0b61d6, #3aa0ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-bg { background: linear-gradient(135deg, #0ea95b, #4ade80); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border-radius: 16px; padding: 40px; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { height: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
class App {
    constructor() {
        this.user = JSON.parse(localStorage.getItem('sportclub_auth') || 'null');
        this.init();
    }

    init() {
        if (this.user) {
            this.showDashboard();
        } else {
            this.showLogin();
        }
    }

    showLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-bg">
                <div class="auth-card">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <img src="/sportclub-logo.png" class="logo">
                        <h1 style="font-size: 28px; font-weight: 700;">Iniciar Sesión</h1>
                        <p style="color: #666; margin: 0;">Accede a tu cuenta SportClub</p>
                    </div>
                    <form onsubmit="app.handleLogin(event)">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" id="loginEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" id="loginPassword" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100">Ingresar</button>
                    </form>
                    <div style="text-align: center; margin-top: 20px;">
                        <p style="margin: 0; color: #666; font-size: 13px;">¿No tienes cuenta?</p>
                        <a href="#" onclick="app.showRegister(); return false;" style="color: #0b61d6; text-decoration: none; font-weight: 600;">Regístrate aquí</a>
                    </div>
                </div>
            </div>
        `;
    }

    showRegister() {
        document.getElementById('app').innerHTML = `
            <div class="register-bg">
                <div class="auth-card">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <img src="/sportclub-logo.png" class="logo">
                        <h1 style="font-size: 28px; font-weight: 700;">Crear Cuenta</h1>
                        <p style="color: #666; margin: 0;">Únete a SportClub</p>
                    </div>
                    <form onsubmit="app.handleRegister(event)">
                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" id="regName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" id="regEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña (6+ caracteres)</label>
                            <input type="password" id="regPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Tipo de Cuenta</label>
                            <select id="regRole" class="form-select">
                                <option value="user">Usuario</option>
                                <option value="coach">Coach</option>
                            </select>
                        </div>
                        <button class="btn btn-success w-100">Registrarse</button>
                    </form>
                    <div style="text-align: center; margin-top: 20px;">
                        <p style="margin: 0; color: #666; font-size: 13px;">¿Ya tienes cuenta?</p>
                        <a href="#" onclick="app.showLogin(); return false;" style="color: #0ea95b; text-decoration: none; font-weight: 600;">Inicia sesión</a>
                    </div>
                </div>
            </div>
        `;
    }

    showDashboard() {
        if (!this.user) return this.showLogin();
        
        let sidebar = `
            <div class="list-group-item" onclick="app.showDash()">📊 Dashboard</div>
            <div class="list-group-item" onclick="app.showProfile()">👤 Mi Perfil</div>
        `;
        
        if (this.user.role === 'admin') {
            sidebar += `<div class="list-group-item" onclick="app.showUsers()">👥 Gestionar Usuarios</div>`;
        }

        document.getElementById('app').innerHTML = `
            <div style="min-height: 100vh; display: grid; grid-template-rows: auto 1fr;">
                <nav class="navbar" style="background: linear-gradient(135deg, #0b61d6, #3aa0ff); padding: 16px 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 16px; color: white;">
                            <img src="/sportclub-logo.png" style="height: 50px; width: auto;">
                            <div>
                                <h2 style="margin: 0; font-size: 24px; font-weight: 700;">SportClub</h2>
                            </div>
                        </div>
                        <div style="display: flex; gap: 12px; color: white;">
                            <button class="btn btn-outline-light btn-sm" onclick="app.showProfile()">Mi Perfil</button>
                            <button class="btn btn-outline-light btn-sm" onclick="app.logout()">Salir</button>
                            <div style="display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 6px;">
                                <span style="font-size: 18px;">👤</span>
                                <div style="font-size: 12px;">
                                    <div style="font-weight: 600;" id="userName">${this.user.full_name}</div>
                                    <div style="opacity: 0.8;">${this.user.role}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
                <div style="display: grid; grid-template-columns: 250px 1fr; gap: 0;">
                    <div style="background: white; padding: 20px 0; border-right: 1px solid #e5e7eb;" class="list-group list-group-flush">
                        ${sidebar}
                    </div>
                    <div style="padding: 32px; overflow-y: auto; background: #f5f7fa;" id="content"></div>
                </div>
            </div>
        `;
        
        this.showDash();
    }

    showDash() {
        let html = '<h2>Dashboard</h2>';
        if (this.user.role === 'admin') {
            html += `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                    <div class="card"><div class="card-body"><div style="font-size: 32px; font-weight: 700; color: #0b61d6;">124</div><div>Usuarios</div></div></div>
                    <div class="card"><div class="card-body"><div style="font-size: 32px; font-weight: 700; color: #0b61d6;">12</div><div>Coaches</div></div></div>
                    <div class="card"><div class="card-body"><div style="font-size: 32px; font-weight: 700; color: #0b61d6;">45</div><div>Clases</div></div></div>
                </div>
            `;
        } else {
            html += `<p>Bienvenido, ${this.user.full_name}</p>`;
        }
        document.getElementById('content').innerHTML = html;
    }

    showProfile() {
        let html = `
            <h2>Mi Perfil</h2>
            <div class="card" style="max-width: 500px;">
                <div class="card-body">
                    <div class="mb-3">
                        <strong>Nombre:</strong> ${this.user.full_name}
                    </div>
                    <div class="mb-3">
                        <strong>Email:</strong> ${this.user.email}
                    </div>
                    <div>
                        <strong>Rol:</strong> <span class="badge bg-info">${this.user.role.toUpperCase()}</span>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }

    showUsers() {
        if (this.user.role !== 'admin') return;
        
        let mockUsers = [
            { id: 1, full_name: 'Admin', email: 'admin@sportclub.cl', role: 'admin' },
            { id: 2, full_name: 'Juan', email: 'juan@mail.com', role: 'user' },
            { id: 3, full_name: 'Coach', email: 'coach@sportclub.cl', role: 'coach' }
        ];
        
        let registered = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
        let allUsers = mockUsers.concat(registered.map((u, i) => ({id: 1000+i, ...u})));
        
        let rows = allUsers.map(u => `
            <tr>
                <td>${u.full_name}</td>
                <td>${u.email}</td>
                <td><span class="badge bg-info">${u.role}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="app.editUser(${u.id}, '${u.full_name}', '${u.email}', '${u.role}')">Editar</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="app.deleteUser('${u.email}')">Eliminar</button>
                </td>
            </tr>
        `).join('');
        
        let html = `
            <h2>Gestionar Usuarios</h2>
            <button class="btn btn-primary mb-3" onclick="app.openAddUserModal()">+ Nuevo Usuario</button>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
    }

    openAddUserModal() {
        Swal.fire({
            title: 'Crear Usuario',
            html: `
                <input type="text" id="swalName" class="swal2-input" placeholder="Nombre" required>
                <input type="email" id="swalEmail" class="swal2-input" placeholder="Email" required>
                <input type="password" id="swalPass" class="swal2-input" placeholder="Contraseña (6+ caracteres)" required>
                <select id="swalRole" class="swal2-input">
                    <option value="user">Usuario</option>
                    <option value="coach">Coach</option>
                    <option value="admin">Admin</option>
                </select>
            `,
            showCancelButton: true,
            confirmButtonText: 'Guardar',
            preConfirm: () => {
                const name = document.getElementById('swalName').value;
                const email = document.getElementById('swalEmail').value;
                const pass = document.getElementById('swalPass').value;
                const role = document.getElementById('swalRole').value;
                
                if (!name || name.length < 3) {
                    Swal.showValidationMessage('Nombre debe tener 3+ caracteres');
                    return false;
                }
                if (!email.includes('@')) {
                    Swal.showValidationMessage('Email inválido');
                    return false;
                }
                if (!pass || pass.length < 6) {
                    Swal.showValidationMessage('Contraseña debe tener 6+ caracteres');
                    return false;
                }
                
                let users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
                users.push({full_name: name, email: email, password: pass, role: role});
                localStorage.setItem('sportclub_users', JSON.stringify(users));
                
                return true;
            }
        }).then(r => {
            if (r.isConfirmed) {
                Swal.fire({icon: 'success', title: 'Guardado', timer: 1000, willClose: () => this.showUsers()});
            }
        });
    }

    editUser(id, name, email, role) {
        Swal.fire({
            title: 'Editar Usuario',
            text: email,
            icon: 'info'
        });
    }

    deleteUser(email) {
        Swal.fire({
            title: 'Eliminar',
            text: 'Se eliminará: ' + email,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Eliminar'
        }).then(r => {
            if (r.isConfirmed) {
                let users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
                users = users.filter(u => u.email !== email);
                localStorage.setItem('sportclub_users', JSON.stringify(users));
                Swal.fire({icon: 'success', title: 'Eliminado', timer: 1000, willClose: () => this.showUsers()});
            }
        });
    }

    handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        
        let mockUsers = [
            {email: 'admin@sportclub.cl', password: '123456', role: 'admin', full_name: 'Admin'},
            {email: 'juan@mail.com', password: 'juan123', role: 'user', full_name: 'Juan'},
            {email: 'coach@sportclub.cl', password: 'coach123', role: 'coach', full_name: 'Coach'}
        ];
        
        let users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
        let found = mockUsers.concat(users).find(u => u.email === email && u.password === pass);
        
        if (!found) {
            Swal.fire({icon: 'error', title: 'Error', text: 'Credenciales inválidas'});
            return;
        }
        
        this.user = {email: found.email, role: found.role, full_name: found.full_name};
        localStorage.setItem('sportclub_auth', JSON.stringify(this.user));
        
        Swal.fire({
            icon: 'success',
            title: 'Bienvenido',
            text: found.full_name,
            timer: 1000,
            willClose: () => this.showDashboard()
        });
    }

    handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        const role = document.getElementById('regRole').value;
        
        if (name.length < 3) {
            Swal.fire({icon: 'error', title: 'Error', text: 'Nombre debe tener 3+ caracteres'});
            return;
        }
        if (pass.length < 6) {
            Swal.fire({icon: 'error', title: 'Error', text: 'Contraseña debe tener 6+ caracteres'});
            return;
        }
        
        let users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
        if (users.some(u => u.email === email)) {
            Swal.fire({icon: 'error', title: 'Error', text: 'Email ya existe'});
            return;
        }
        
        users.push({full_name: name, email: email, password: pass, role: role});
        localStorage.setItem('sportclub_users', JSON.stringify(users));
        
        Swal.fire({
            icon: 'success',
            title: 'Registro exitoso',
            text: 'Redirigiendo a login',
            timer: 1500,
            willClose: () => this.showLogin()
        });
    }

    logout() {
        Swal.fire({
            title: 'Cerrar sesión',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            confirmButtonText: 'Sí'
        }).then(r => {
            if (r.isConfirmed) {
                localStorage.removeItem('sportclub_auth');
                this.user = null;
                this.showLogin();
            }
        });
    }
}

const app = new App();
</script>
</body>
</html>
