<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Registro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0ea95b 0%, #4ade80 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-img {
            max-height: 60px;
            width: auto;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #0ea95b;
            box-shadow: 0 0 0 3px rgba(14, 169, 91, 0.1);
        }
        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .role-option {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .role-option:hover {
            border-color: #0ea95b;
            background: #f0fdf4;
        }
        .role-option input {
            display: none;
        }
        .role-option.selected {
            border-color: #0ea95b;
            background: #dcfce7;
            font-weight: 600;
        }
        .role-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin: 8px 0 0 0;
        }
        .btn-register {
            background: linear-gradient(135deg, #0ea95b 0%, #4ade80 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .btn-register:hover {
            opacity: 0.95;
        }
        .form-footer {
            text-align: center;
            margin-top: 24px;
        }
        .form-footer p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .login-link {
            color: #0ea95b;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo-section">
            <img src="/sportclub-logo.png" alt="SportClub" class="logo-img">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Únete a la comunidad SportClub</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName" class="form-label">Nombre Completo</label>
                <input type="text" id="fullName" class="form-control" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label class="form-label">Tipo de Cuenta</label>
                <div class="role-grid">
                    <label class="role-option selected">
                        <input type="radio" name="role" value="user" checked>
                        <div style="font-size: 24px;">👤</div>
                        <p class="role-label">Usuario</p>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="coach">
                        <div style="font-size: 24px;">🏋️</div>
                        <p class="role-label">Coach</p>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Registrarse
            </button>
        </form>

        <div class="form-footer">
            <p>¿Ya tienes cuenta?</p>
            <a class="login-link" onclick="goToLogin()">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        function goToLogin() {
            window.location.href = '/login.html';
        }

        document.querySelectorAll('.role-option input').forEach(input => {
            input.addEventListener('change', function() {
                document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
                this.closest('.role-option').classList.add('selected');
            });
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            if (!fullName || fullName.length < 3) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Nombre inválido',
                    text: 'El nombre debe tener al menos 3 caracteres',
                    confirmButtonColor: '#0ea95b'
                });
                return;
            }

            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Email inválido',
                    text: 'Por favor ingresa un email válido',
                    confirmButtonColor: '#0ea95b'
                });
                return;
            }

            if (password.length < 6) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Contraseña débil',
                    text: 'La contraseña debe tener al menos 6 caracteres',
                    confirmButtonColor: '#0ea95b'
                });
                return;
            }

            const users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
            if (users.some(u => u.email === email)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Email duplicado',
                    text: 'Este correo ya está registrado',
                    confirmButtonColor: '#0ea95b'
                });
                return;
            }

            users.push({ full_name: fullName, email, password, role });
            localStorage.setItem('sportclub_users', JSON.stringify(users));

            Swal.fire({
                icon: 'success',
                title: '¡Registro exitoso!',
                text: 'Redirigiendo a login...',
                confirmButtonColor: '#0ea95b',
                timer: 1200,
                willClose: () => {
                    window.location.href = '/login.html';
                }
            });
        });
    </script>
</body>
</html>
