<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0b61d6 0%, #3aa0ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-img {
            max-height: 60px;
            width: auto;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #0b61d6;
            box-shadow: 0 0 0 3px rgba(11, 97, 214, 0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #0b61d6 0%, #3aa0ff 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        .btn-login:hover {
            opacity: 0.95;
        }
        .form-footer {
            text-align: center;
            margin-top: 24px;
        }
        .form-footer p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .register-link {
            color: #0b61d6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .register-link:hover {
            text-decoration: underline;
        }
        .demo-box {
            background: #f0f4f8;
            border-left: 4px solid #0b61d6;
            padding: 16px;
            border-radius: 8px;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }
        .demo-box strong {
            color: #0b61d6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <img src="/sportclub-logo.png" alt="SportClub" class="logo-img">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">Accede a tu cuenta SportClub</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

        <div class="form-footer">
            <p>¿No tienes cuenta?</p>
            <a class="register-link" onclick="goToRegister()">Crear cuenta aquí</a>
        </div>

        <div class="demo-box">
            <p><strong>📋 Credenciales de Prueba:</strong></p>
            <p style="margin: 6px 0;"><strong>Admin:</strong> admin@sportclub.cl / 123456</p>
            <p style="margin: 6px 0;"><strong>Usuario:</strong> juan@mail.com / juan123</p>
            <p style="margin: 6px 0;"><strong>Coach:</strong> coach@sportclub.cl / coach123</p>
        </div>
    </div>

    <script>
        function goToRegister() {
            window.location.href = '/register.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const mockUsers = [
                { email: 'admin@sportclub.cl', password: '123456', role: 'admin', full_name: 'Admin User' },
                { email: 'juan@mail.com', password: 'juan123', role: 'user', full_name: 'Juan Usuario' },
                { email: 'coach@sportclub.cl', password: 'coach123', role: 'coach', full_name: 'Pedro Coach' }
            ];

            const registeredUsers = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
            const allUsers = [...mockUsers, ...registeredUsers];
            const user = allUsers.find(u => u.email === email && u.password === password);

            if (!user) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Correo o contraseña incorrectos',
                    confirmButtonColor: '#0b61d6'
                });
                return;
            }

            localStorage.setItem('sportclub_auth', JSON.stringify({
                email: user.email,
                role: user.role,
                full_name: user.full_name,
                token: 'mock_' + Date.now()
            }));

            Swal.fire({
                icon: 'success',
                title: '¡Bienvenido!',
                text: user.full_name,
                confirmButtonColor: '#0b61d6',
                timer: 1200,
                willClose: () => {
                    window.location.href = '/dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
