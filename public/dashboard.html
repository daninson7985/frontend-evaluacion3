<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <style>
        :root {
            --user-color: #0b61d6;
            --coach-color: #0ea95b;
            --admin-color: #9333ea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .navbar-custom { padding: 0; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); }
        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            color: white;
            min-height: 70px;
        }
        .navbar-brand-section { display: flex; align-items: center; gap: 16px; }
        .logo-image { height: 50px; width: auto; }
        .brand-text h2 { font-size: 24px; font-weight: 700; margin: 0; }
        .brand-text p { font-size: 12px; margin: 0; opacity: 0.9; text-transform: uppercase; }
        .navbar-actions { display: flex; gap: 20px; align-items: center; }
        .navbar-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .navbar-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        .main-container { display: grid; grid-template-columns: 250px 1fr; gap: 0; min-height: calc(100vh - 70px); }
        .sidebar {
            background: white;
            padding: 24px 0;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
            border-right: 1px solid #e5e7eb;
        }
        .sidebar-item {
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 8px 4px 8px;
        }
        .sidebar-item:hover { background: #f0f4f8; }
        .sidebar-item.active { color: white; font-weight: 600; }
        .content-area { padding: 32px; overflow-y: auto; }
        .user-theme .navbar-content { background: linear-gradient(135deg, var(--user-color) 0%, #3aa0ff 100%); }
        .coach-theme .navbar-content { background: linear-gradient(135deg, var(--coach-color) 0%, #4ade80 100%); }
        .admin-theme .navbar-content { background: linear-gradient(135deg, var(--admin-color) 0%, #d946ef 100%); }

        .users-table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .users-table table { margin: 0; }
        .users-table thead { background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .users-table th { font-weight: 600; color: #333; padding: 16px; font-size: 13px; text-transform: uppercase; }
        .users-table td { padding: 16px; border-bottom: 1px solid #e5e7eb; }
        .users-table tr:hover { background: #f9fafb; }

        .btn-action {
            padding: 6px 12px;
            margin: 0 4px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-edit { background: #e0f4ff; color: #0b61d6; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-create { background: var(--theme-color, #0b61d6); color: white; padding: 10px 20px; margin-bottom: 20px; border: none; border-radius: 6px; cursor: pointer; }

        .user-theme { --theme-color: var(--user-color); }
        .coach-theme { --theme-color: var(--coach-color); }
        .admin-theme { --theme-color: var(--admin-color); }
    </style>
</head>
<body>
    <div id="app" class="user-theme">
        <nav class="navbar-custom">
            <div class="navbar-content">
                <div class="navbar-brand-section">
                    <img src="/sportclub-logo.png" alt="SportClub" class="logo-image">
                    <div class="brand-text">
                        <h2>SportClub</h2>
                        <p id="roleBadge">Usuario</p>
                    </div>
                </div>
                <div class="navbar-actions">
                    <button class="navbar-btn" onclick="showProfile()"><i class="fas fa-user-circle"></i> Mi Perfil</button>
                    <button class="navbar-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
                    <div class="navbar-user" style="color: white;">
                        <div style="font-size: 18px;">👤</div>
                        <div>
                            <div style="font-size: 13px; font-weight: 600;" id="userName">Usuario</div>
                            <div style="font-size: 11px; opacity: 0.8;" id="userRole">user</div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-item active" onclick="showDashboard()">
                    <span>📊</span> Dashboard
                </div>
                <div class="sidebar-item" id="itemProfile" onclick="showProfile()">
                    <span>👤</span> Mi Perfil
                </div>
                <div class="sidebar-item" id="itemUsers" style="display: none;" onclick="showUsers()">
                    <span>👥</span> Gestionar Usuarios
                </div>
            </aside>

            <main class="content-area" id="content"></main>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Crear Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="userFullName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="userEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="userPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select class="form-select" id="userRole">
                                <option value="user">Usuario</option>
                                <option value="coach">Coach</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', function() {
            const auth = JSON.parse(localStorage.getItem('sportclub_auth'));
            if (!auth) {
                window.location.href = '/login.html';
                return;
            }

            const app = document.getElementById('app');
            app.className = auth.role + '-theme';

            document.getElementById('userName').textContent = auth.full_name || 'Usuario';
            document.getElementById('userRole').textContent = auth.role.toUpperCase();
            document.getElementById('roleBadge').textContent = auth.role === 'user' ? 'Usuario' : auth.role === 'coach' ? 'Coach' : 'Administrador';

            if (auth.role === 'admin') {
                document.getElementById('itemUsers').style.display = 'flex';
            }

            showDashboard();
        });

        function showDashboard() {
            const auth = JSON.parse(localStorage.getItem('sportclub_auth'));
            let content = '<h2 style="margin-bottom: 32px;">Dashboard</h2>';
            
            if (auth.role === 'admin') {
                content += `
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                        <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                            <div style="font-size: 32px; font-weight: 700; color: #9333ea;">124</div>
                            <div style="color: #666; font-size: 14px;">Total de Usuarios</div>
                        </div>
                        <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                            <div style="font-size: 32px; font-weight: 700; color: #9333ea;">12</div>
                            <div style="color: #666; font-size: 14px;">Coaches Activos</div>
                        </div>
                        <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                            <div style="font-size: 32px; font-weight: 700; color: #9333ea;">45</div>
                            <div style="color: #666; font-size: 14px;">Clases</div>
                        </div>
                    </div>
                `;
            } else if (auth.role === 'coach') {
                content += '<p>Bienvenido ' + auth.full_name + '. Aquí podrás gestionar tus clases.</p>';
            } else {
                content += '<p>Bienvenido ' + auth.full_name + '. Explora las clases disponibles.</p>';
            }

            document.getElementById('content').innerHTML = content;
            updateSidebar('dashboard');
        }

        function showUsers() {
            const mockUsers = [
                { id: 1, full_name: 'Admin User', email: 'admin@sportclub.cl', role: 'admin' },
                { id: 2, full_name: 'Juan Usuario', email: 'juan@mail.com', role: 'user' },
                { id: 3, full_name: 'Pedro Coach', email: 'coach@sportclub.cl', role: 'coach' }
            ];

            const registeredUsers = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
            const allUsers = [...mockUsers, ...registeredUsers.map((u, i) => ({ id: 1000 + i, ...u }))];

            let html = '<h2 style="margin-bottom: 20px;">Gestión de Usuarios</h2>';
            html += '<button class="btn-create" onclick="openCreateUserModal()"><i class="fas fa-user-plus"></i> Nuevo Usuario</button>';
            html += '<div class="users-table"><table class="table"><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead><tbody>';

            allUsers.forEach(user => {
                html += `<tr>
                    <td>${user.full_name}</td>
                    <td>${user.email}</td>
                    <td><span class="badge bg-info">${user.role}</span></td>
                    <td>
                        <button class="btn-action btn-edit" onclick="editUser(${user.id}, '${user.full_name}', '${user.email}', '${user.role}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteUser(${user.id}, '${user.email}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            document.getElementById('content').innerHTML = html;
            updateSidebar('users');
        }

        function openCreateUserModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Crear Usuario';
            document.getElementById('userForm').reset();
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        function editUser(id, name, email, role) {
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Editar Usuario';
            document.getElementById('userFullName').value = name;
            document.getElementById('userEmail').value = email;
            document.getElementById('userRole').value = role;
            document.getElementById('userPassword').value = '';
            new bootstrap.Modal(document.getElementById('userModal')).show();
        }

        function saveUser() {
            const name = document.getElementById('userFullName').value;
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            if (!name || !email || !password) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Completa todos los campos', confirmButtonColor: '#9333ea' });
                return;
            }

            const users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
            users.push({ full_name: name, email, password, role });

            Swal.fire({
                icon: 'success',
                title: 'Usuario creado',
                confirmButtonColor: '#9333ea',
                timer: 1000,
                willClose: () => {
                    localStorage.setItem('sportclub_users', JSON.stringify(users));
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    showUsers();
                }
            });
        }

        function deleteUser(id, email) {
            Swal.fire({
                title: '¿Eliminar usuario?',
                text: 'Estás a punto de eliminar: ' + email,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, eliminar'
            }).then((result) => {
                if (result.isConfirmed) {
                    const users = JSON.parse(localStorage.getItem('sportclub_users') || '[]');
                    const updatedUsers = users.filter(u => u.email !== email);
                    localStorage.setItem('sportclub_users', JSON.stringify(updatedUsers));
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Eliminado',
                        text: 'Usuario eliminado correctamente',
                        confirmButtonColor: '#9333ea',
                        timer: 1000,
                        willClose: () => showUsers()
                    });
                }
            });
        }

        function showProfile() {
            const auth = JSON.parse(localStorage.getItem('sportclub_auth'));
            document.getElementById('content').innerHTML = `
                <h2 style="margin-bottom: 32px;">Mi Perfil</h2>
                <div style="background: white; padding: 32px; border-radius: 12px; max-width: 500px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <div style="margin-bottom: 20px;">
                        <div style="color: #666; font-size: 13px; margin-bottom: 4px;">Nombre</div>
                        <div style="font-size: 16px; font-weight: 600;">${auth.full_name}</div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div style="color: #666; font-size: 13px; margin-bottom: 4px;">Email</div>
                        <div style="font-size: 16px; font-weight: 600;">${auth.email}</div>
                    </div>
                    <div>
                        <div style="color: #666; font-size: 13px; margin-bottom: 4px;">Rol</div>
                        <span class="badge bg-info" style="font-size: 12px; padding: 6px 12px;">${auth.role.toUpperCase()}</span>
                    </div>
                </div>
            `;
            updateSidebar('profile');
        }

        function updateSidebar(page) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            if (page === 'dashboard') document.querySelector('.sidebar-item').classList.add('active');
            else if (page === 'profile') document.getElementById('itemProfile').classList.add('active');
            else if (page === 'users') document.getElementById('itemUsers').classList.add('active');
        }

        function logout() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, cerrar sesión'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('sportclub_auth');
                    Swal.fire({
                        icon: 'success',
                        title: 'Sesión cerrada',
                        confirmButtonColor: '#0b61d6',
                        timer: 1000,
                        willClose: () => {
                            window.location.href = '/login.html';
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
